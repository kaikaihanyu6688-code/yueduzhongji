<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카이카이 중국어</title>
<style>
body{font-family:sans-serif;margin:0}
.page{display:none;padding:40px}
.page.active{display:block}
.card{padding:20px;border:1px solid #ccc;margin:10px;cursor:pointer}
</style>
</head>
<body>

<h1 style="padding:20px">카이카이 중국어</h1>

<div id="home" class="page active">
  <div class="card" onclick="go('jianjianhua')">剪窗花</div>
  <div class="card" onclick="go('xishouge')">洗手歌</div>
  <div class="card" onclick="go('malatang')">麻辣烫</div>
  <div class="card" onclick="go('hallyu')">한류</div>
  <div class="card" onclick="go('zgeneration')">Z세대</div>
  <div class="card" onclick="go('mingyan')">명언</div>
</div>

<div id="lesson" class="page">
  <button onclick="goHome()">← 홈으로</button>
  <h2 id="title"></h2>
  <div id="content"></div>
</div>

<script>
const LESSONS = {
  jianjianhua:{title:'剪窗花',content:'수업 내용 준비 완료'},
  xishouge:{title:'洗手歌',content:'수업 내용 준비 완료'},
  malatang:{title:'麻辣烫',content:'수업 내용 준비 완료'},
  hallyu:{title:'한류',content:'🚧 준비중입니다'},
  zgeneration:{title:'Z세대',content:'🚧 준비중입니다'},
  mingyan:{title:'명언',content:'🚧 준비중입니다'}
};

function go(id){
  location.hash=id;
}

function goHome(){
  location.hash='';
}

function render(){
  const id=location.hash.replace('#','');
  if(!id || !LESSONS[id]){
    showHome();
  }else{
    showLesson(id);
  }
}

function showHome(){
  document.getElementById('home').classList.add('active');
  document.getElementById('lesson').classList.remove('active');
}

function showLesson(id){
  const L=LESSONS[id];
  document.getElementById('home').classList.remove('active');
  document.getElementById('lesson').classList.add('active');
  document.getElementById('title').textContent=L.title;
  document.getElementById('content').textContent=L.content;
}

window.addEventListener('hashchange',render);
window.addEventListener('load',render);
</script>

</body>
</html>
